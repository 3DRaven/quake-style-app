# Quake Style App — tmux config for the dropdown's PRIVATE server.
# Used as:  tmux -L quake-style-app -f <this file> new-session -A -s <session>
#
# A private socket (-L) keeps this FULLY separate from your normal tmux. The host
# ~/.tmux.conf is intentionally NOT loaded — the dropdown's tmux is self-contained.
# Your own tweaks for it live in the extension's settings (tmux-config), which the
# extension writes to the file sourced below; everything stays within the extension.
# We then force the two things the dropdown needs:
#   1. tmux's own status bar OFF — our native St tab bar replaces it;
#   2. hooks that touch a tab-event file on every window change. The extension watches
#      that file (Gio.FileMonitor) and repaints the native tab bar — no polling, no
#      D-Bus. The only process spawned here is tmux's own `touch`.

source-file -q ~/.config/quake-style-app/tmux-extra.conf

set -g status off
set -g mouse on

set-hook -g after-new-window       'run-shell -b "touch ~/.config/quake-style-app/.tab-event 2>/dev/null || true"'
set-hook -g window-unlinked        'run-shell -b "touch ~/.config/quake-style-app/.tab-event 2>/dev/null || true"'
set-hook -g window-renamed         'run-shell -b "touch ~/.config/quake-style-app/.tab-event 2>/dev/null || true"'
set-hook -g session-window-changed 'run-shell -b "touch ~/.config/quake-style-app/.tab-event 2>/dev/null || true"'
